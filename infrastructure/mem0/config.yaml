version: "0.1"

vector_store:
  provider: qdrant
  config:
    host: localhost
    port: 6333

llm:
  provider: ollama
  config:
    model: llama3
    ollama_base_url: http://localhost:11434

embedder:
  provider: ollama
  config:
    model: nomic-embed-text

history_db:
  provider: sqlite
  config:
    path: /data/mem0.db
